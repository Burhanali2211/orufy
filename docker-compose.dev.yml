services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-saas_dev}
      POSTGRES_USER:     ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - saas-dev-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - saas-dev-net

volumes:
  postgres_dev_data:
    driver: local

networks:
  saas-dev-net:
    driver: bridge
