# Internal Nginx config for the SPA container (port 4173)
# The host Nginx (saas.conf) proxies / to this container.
# No SSL here — SSL terminates at the host Nginx.
server {
    listen 4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml font/woff2;

    # SPA fallback — all unknown paths return index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets from Vite — cache forever
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
