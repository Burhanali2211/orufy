<body>
  <div id="root">
    <!-- Inline loader shown before React hydrates — replaced automatically when React mounts -->
    <div id="app-init-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#ffffff;z-index:9999;gap:20px;">
      <div style="width:48px;height:48px;border-radius:50%;border:3px solid #dcfce7;border-top-color:#15803d;animation:_appSpin 0.7s linear infinite;"></div>
      <p style="font-family:system-ui,sans-serif;font-size:13px;font-weight:600;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;">Loading...</p>
      <style>@keyframes _appSpin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!-- Razorpay SDK is now loaded dynamically only when needed (on checkout/payment pages) -->
  <!-- This reduces initial page load time and network requests -->

  <!-- Unregister Service Workers immediately to prevent caching issues -->
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        // Unregister all Service Workers on page load
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().catch(function() {
              // Ignore errors during unregistration
            });
          }
        }).catch(function() {
          // Ignore errors
        });
        
        // Also handle any existing Service Worker
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
        }
      }
    })();
  </script>

  <!-- Monitoring scripts (to be added by build process) -->
  <script type="module" src="/src/main.tsx"></script>
</body>
